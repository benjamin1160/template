name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Registry integrity
        run: node scripts/check-registry.mjs
      - name: Lint
        run: npm run lint
      - name: Build (catalog enabled — compiles every variant × vibe)
        run: npm run build
        env:
          NEXT_PUBLIC_ENABLE_CATALOG: "1"
